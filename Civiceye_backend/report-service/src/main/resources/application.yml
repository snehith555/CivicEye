server:
  port: 8082

spring:
  application:
    name: report-service
  data_source:
    url: jdbc:mysql://localhost:3306/civiceye_report
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka