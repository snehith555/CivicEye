server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/user/**

        - id: report-service
          uri: lb://REPORT-SERVICE
          predicates:
            - Path=/api/report/**

        - id: ai-service
          uri: lb://AI-SERVICE
          predicates:
            - Path=/api/ai/**

      httpclient:
        wiretap: true
        forwarded:
          enabled: true

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5174"
              - "http://localhost:5173"
              - "http://localhost:5175"
              - "http://localhost:5176"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka